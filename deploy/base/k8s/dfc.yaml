apiVersion: v1
kind: Namespace
metadata:
  name: dfc
  labels:
    app.kubernetes.io/name: dfc
    app.kubernetes.io/part-of: aivcs
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dfc
  namespace: dfc
  labels:
    app.kubernetes.io/name: dfc
    app.kubernetes.io/part-of: aivcs
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dfc-config
  namespace: dfc
  labels:
    app.kubernetes.io/name: dfc
    app.kubernetes.io/part-of: aivcs
data:
  DFC_HOST: "0.0.0.0"
  DFC_PORT: "8080"
  DFC_PUBLIC_FQDN: "dfc.aivcs.io"
  AIVCS_API_URL: "http://aivcs-api.aivcs.svc.cluster.local"
  DATA_FABRIC_URL: "http://data-fabric.data-fabric.svc.cluster.local"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dfc
  namespace: dfc
  labels:
    app.kubernetes.io/name: dfc
    app.kubernetes.io/part-of: aivcs
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: dfc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dfc
        app.kubernetes.io/part-of: aivcs
    spec:
      serviceAccountName: dfc
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dfc
          # Prod image (infra-code overlay): us-central1-docker.pkg.dev/gcp-lornu-ai/lornu/dfc:0.1.1
          image: us-central1-docker.pkg.dev/gcp-lornu-ai/lornu/dfc:0.1.1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: dfc-config
          env:
            # Optional until GSM secret dfc-data-fabric-tenant-id is seeded (infra-code ExternalSecret).
            - name: DATA_FABRIC_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: dfc-secrets
                  key: tenant-id
                  optional: true
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dfc
  namespace: dfc
  labels:
    app.kubernetes.io/name: dfc
    app.kubernetes.io/part-of: aivcs
  annotations:
    cloud.google.com/neg: '{"exposed_ports":{"8080":{}}}'
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: dfc
  ports:
    - name: http
      port: 8080
      targetPort: http
