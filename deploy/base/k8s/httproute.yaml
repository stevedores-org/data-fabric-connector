# Canonical HTTPRoute for dfc.aivcs.io (app reference).
# Flux-deployed copy: lornu-ai/infra-code
#   crossplane/gcp/hub/spoke/apps/dfc/overlays/gke/prod
# Kustomization: apps-dfc-gke-prod
#
# GKE prod also ships HealthCheckPolicy (see healthcheckpolicy.yaml) via infra-code only.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dfc
  namespace: dfc
  labels:
    app.kubernetes.io/name: dfc
    app.kubernetes.io/part-of: aivcs
    lornu.ai/managed-by: flux
spec:
  parentRefs:
    - name: shared-tls-gateway
      namespace: gateway-system
      sectionName: https-aivcs-io-wildcard
  hostnames:
    - dfc.aivcs.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dfc
          port: 8080
          weight: 1
