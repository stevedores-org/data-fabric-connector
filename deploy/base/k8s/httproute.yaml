apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dfc
  namespace: dfc
  labels:
    app.kubernetes.io/name: dfc
    app.kubernetes.io/part-of: aivcs
spec:
  parentRefs:
    - name: shared-tls-gateway
      namespace: gateway-system
      sectionName: https-aivcs-io-wildcard
  hostnames:
    - dfc.aivcs.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dfc
          port: 80
          weight: 1
