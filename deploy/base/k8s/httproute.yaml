# Canonical HTTPRoute for dfc.aivcs.io.
# Production reconcile: lornu-ai/lornu.ai (Crossplane + Flux on lornu-gke-prod).
# Keep in sync with the Flux-deployed copy when changing hostnames or backend ports.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dfc
  namespace: dfc
  labels:
    app.kubernetes.io/name: dfc
    app.kubernetes.io/part-of: aivcs
    lornu.ai/managed-by: flux
spec:
  parentRefs:
    - name: shared-tls-gateway
      namespace: gateway-system
      sectionName: https-aivcs-io-wildcard
  hostnames:
    - dfc.aivcs.io
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dfc
          port: 80
          weight: 1
